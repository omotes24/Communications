name: Sole Owner Approval

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sole-owner-approval-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-owner-approval:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Require the sole production owner's approval
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const owner = "omotes24";
            const author = context.payload.pull_request.user.login.toLowerCase();
            if (author === owner) return;

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              },
            );
            const currentHead = context.payload.pull_request.head.sha;
            let ownerDecision = null;
            for (const review of reviews) {
              const reviewer = review.user?.login?.toLowerCase();
              if (
                reviewer === owner &&
                review.commit_id === currentHead &&
                ["APPROVED", "CHANGES_REQUESTED", "DISMISSED"].includes(review.state)
              ) {
                ownerDecision = review.state;
              }
            }
            if (ownerDecision !== "APPROVED") {
              core.setFailed("Approval from @omotes24 on the current commit is required.");
            }
