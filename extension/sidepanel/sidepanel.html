<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Webテストを自動で解く</title>
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <main>
      <header>
        <p>YELL FOR YOU 1.2</p>
        <h1>Webテストを自動で解く</h1>
        <div class="toolbar">
          <button id="detectNow" type="button">検知</button>
          <button id="restartDetection" class="secondary" type="button">
            リスタート
          </button>
        </div>
        <div class="mode-setting" aria-label="出力形式">
          <span>出力</span>
          <button type="button" data-solve-mode="answer_only">解答のみ</button>
          <button type="button" data-solve-mode="explanation">解説</button>
          <button type="button" data-solve-mode="step_by_step">途中式</button>
        </div>
        <div class="api-setting" aria-label="API送信先">
          <label for="apiBaseUrl">API</label>
          <input
            id="apiBaseUrl"
            type="url"
            spellcheck="false"
            placeholder="http://localhost:3000"
          />
          <button id="saveApiBaseUrl" class="secondary" type="button">保存</button>
          <button id="testApiBaseUrl" class="secondary" type="button">確認</button>
        </div>
        <p id="apiBaseUrlStatus" class="api-status" aria-live="polite"></p>
        <div class="account-setting" aria-label="アカウント">
          <span id="accountStatus" class="api-status">アカウント確認中...</span>
          <button id="accountLogin" class="secondary" type="button" hidden>
            ログイン
          </button>
        </div>
      </header>
      <section class="preview-section" aria-label="画面プレビューと切り抜き">
        <div id="previewBox" class="preview-box">
          <img id="previewImage" alt="現在のタブのプレビュー" hidden />
          <p id="previewPlaceholder" class="preview-placeholder">
            プレビューを読み込んでいます...
          </p>
          <div id="previewCropBox" class="preview-crop" hidden></div>
        </div>
        <div class="preview-actions">
          <button id="previewSolve" type="button">解く</button>
          <button id="previewReset" class="secondary" type="button">
            範囲リセット
          </button>
          <button id="previewRefresh" class="secondary" type="button">
            更新
          </button>
        </div>
        <p id="previewStatus" class="api-status" aria-live="polite"></p>
      </section>
      <section id="questions" class="list"></section>
      <section id="solution" class="solution"></section>
    </main>
    <script src="./sidepanel.js"></script>
  </body>
</html>
